name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "25 8,18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # On schedule trigger: generate fresh articles BEFORE building SSG
      # so the new articles appear in the sitemap immediately
      - name: Generate daily articles (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          echo "Triggering daily-automation..."
          RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
            "$VITE_SUPABASE_URL/functions/v1/daily-automation" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $VITE_SUPABASE_KEY" \
            -d '{}')
          echo "$RESULT"
          echo "Waiting 30s for articles to be saved..."
          sleep 30
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Install dependencies and build
        run: |
          npm install
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Submit new URLs to IndexNow (Bing)
        run: |
          # Extract the 10 most recent article slugs from the sitemap
          URLS=$(grep -oP 'https://prophetic\.pw/article/[^<]+' ./dist/sitemap.xml 2>/dev/null | head -10 | tr '\n' ',' | sed 's/,$//')
          if [ -n "$URLS" ]; then
            # Build JSON array
            URL_ARRAY=$(echo $URLS | sed 's/,/","/g' | sed 's/^/["/' | sed 's/$/"]/')
            echo "Submitting to IndexNow: $URL_ARRAY"
            curl -s -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "{\"host\":\"prophetic.pw\",\"key\":\"a0ed604574874b10b1d2245fd9eeaed8\",\"keyLocation\":\"https://prophetic.pw/a0ed604574874b10b1d2245fd9eeaed8.txt\",\"urlList\":$URL_ARRAY}"
            echo "IndexNow submission done"
          fi

      - name: Create CNAME for custom domain
        run: echo "prophetic.pw" > ./dist/CNAME

      - name: Ensure Bing IndexNow key file exists
        run: echo "a0ed604574874b10b1d2245fd9eeaed8" > ./dist/a0ed604574874b10b1d2245fd9eeaed8.txt

      - name: Copy essential static assets to dist
        run: |
          cp public/manifest.json ./dist/manifest.json || true
          cp public/ads.txt ./dist/ads.txt || true
          cp public/googlec2dbc31ac222183d.html ./dist/googlec2dbc31ac222183d.html || true
          cp public/404.html ./dist/404.html || true
          cp public/favicon.ico ./dist/favicon.ico || true
          cp public/favicon.svg ./dist/favicon.svg || true
          cp public/logo.svg ./dist/logo.svg || true
          cp public/icon-192.png ./dist/icon-192.png || true
          cp public/icon-512.png ./dist/icon-512.png || true
          cp public/og-image.jpg ./dist/og-image.jpg || true
          cp robots.txt ./dist/robots.txt

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

  deploy-supabase:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy Supabase functions when pushing to main (not on schedule trigger)
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions to Supabase
        run: |
          supabase functions deploy generate-article --project-ref bltytefghazluwicnaii --no-verify-jwt
          supabase functions deploy daily-automation --project-ref bltytefghazluwicnaii --no-verify-jwt
          supabase functions deploy google-indexing --project-ref bltytefghazluwicnaii --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
