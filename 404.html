<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Prophetic | Redirecting...</title>
    <script type="text/javascript">
      // Prefer static SSG pages when they exist.
      // If the path exists as a static file, GitHub Pages will serve it and this
      // 404 page won't run. For SPA fallback, preserve the original path without
      // adding "/?/" so crawlers see canonical URLs.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname +
        (l.search || '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting to <a href="/">Prophetic</a>...
  </body>
</html>
